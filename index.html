<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Analyseur Équestre">

<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<meta charset=UTF-8>
<link rel="stylesheet" href="loader.css">
<style>
    body {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-color: #A7B8ED;
}
p {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 18px;
    color: #333333;
    margin-bottom: 20px;  
}
.box {
    border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
            max-width: 400px;
            margin: 0 auto 20px auto;
}
h1 {
    font-family: 'Bebas Neue', cursive;
    text-align: center;
    margin-bottom: 20px;
}


.container {
            max-width: 800px;
            text-align: center;
            align-items: center;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
.preview {
    text-align: center;
}

#uploadedImage {
    max-width: 300px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}
#imageInput {
    display: none;
}
button {
  margin: 20px auto;  /* Ajoute cette ligne */
  display: flex;
  align-items: center;
  font-family: inherit, sans-serif;
  cursor: pointer;
  font-weight: 500;
  font-size: 17px;
  padding: 0.8em 1.3em 0.8em 0.9em;
  color: white;
  background: #ad5389;
  background: linear-gradient(to right, #403697, #7996ee, #667eea);
  border: none;
  letter-spacing: 0.05em;
  border-radius: 16px;
}

button svg {
  margin-right: 3px;
  transform: rotate(30deg);
  transition: transform 0.5s cubic-bezier(0.76, 0, 0.24, 1);
}

button span {
  transition: transform 0.5s cubic-bezier(0.76, 0, 0.24, 1);
}

button:hover svg {
  transform: translateX(5px) rotate(90deg);
}

button:hover span {
  transform: translateX(7px);
}

</style>

</head>
<body>

<div class="container">
<h1>Analyseur de position equestre</h1>
<p>Utilisez ce site web pour analyser votre position en tant que cavalier et obtenir un score sur 100.</p>
<div class ="box">  
<img src="upload.png" alt="Image upload" style="width:100px; height:auto; margin-bottom: 15px;">
<input type="file" id="imageInput" accept="image/*">


<div class="preview" id="preview" style="display: none;">
    <img id="uploadedImage" src="" alt="Image uploadée">
    </div>
</div>
<button id="AnalyzeBtn">
  <svg
    height="24"
    width="24"
    viewBox="0 0 24 24"
    xmlns="http://www.w3.org/2000/svg"
  >
    <path d="M0 0h24v24H0z" fill="none"></path>
    <path
      d="M5 13c0-5.088 2.903-9.436 7-11.182C16.097 3.564 19 7.912 19 13c0 .823-.076 1.626-.22 2.403l1.94 1.832a.5.5 0 0 1 .095.603l-2.495 4.575a.5.5 0 0 1-.793.114l-2.234-2.234a1 1 0 0 0-.707-.293H9.414a1 1 0 0 0-.707.293l-2.234 2.234a.5.5 0 0 1-.793-.114l-2.495-4.575a.5.5 0 0 1 .095-.603l1.94-1.832C5.077 14.626 5 13.823 5 13zm1.476 6.696l.817-.817A3 3 0 0 1 9.414 18h5.172a3 3 0 0 1 2.121.879l.817.817.982-1.8-1.1-1.04a2 2 0 0 1-.593-1.82c.124-.664.187-1.345.187-2.036 0-3.87-1.995-7.3-5-8.96C8.995 5.7 7 9.13 7 13c0 .691.063 1.372.187 2.037a2 2 0 0 1-.593 1.82l-1.1 1.039.982 1.8zM12 13a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"
      fill="currentColor"
    ></path>
  </svg>
  <span>charger</span>
</button>
<div id="loader" style="display: none; margin: 20px auto;" aria-label="Orange and tan hamster running in a metal wheel" role="img" class="wheel-and-hamster">
    <div class="wheel"></div>
    <div class="hamster">
        <div class="hamster__body">
            <div class="hamster__head">
                <div class="hamster__ear"></div>
                <div class="hamster__eye"></div>
                <div class="hamster__nose"></div>
            </div>
            <div class="hamster__limb hamster__limb--fr"></div>
            <div class="hamster__limb hamster__limb--fl"></div>
            <div class="hamster__limb hamster__limb--br"></div>
            <div class="hamster__limb hamster__limb--bl"></div>
            <div class="hamster__tail"></div>
        </div>
    </div>
    <div class="spoke"></div>
</div>
<p>Ce site est en cours de développement et les résultats peuvent ne pas être précis à 100%</p>
</div>
<script>
  const ROBOFLOW_API_KEY = "RUM3trtexcoObtRCYkeK";
  const ROBOFLOW_PROJECT = "analyse-dressage-prototype";
  const ROBOFLOW_VERSION = "1";

  document.querySelector('.box').addEventListener('click', function() {
    document.getElementById('imageInput').click();
  });

  document.getElementById('imageInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        document.querySelector('.box img[src="upload.png"]').style.display = 'none';
        document.getElementById('preview').style.display = 'block';
        document.getElementById('uploadedImage').src = event.target.result;
      };
      reader.readAsDataURL(file);
    }
  });

  document.getElementById('AnalyzeBtn').addEventListener('click', async function() {
    const imageInput = document.getElementById('imageInput');
    if (!imageInput.files[0]) {
      alert("Veuillez d'abord choisir une image !");
      return;
    }

    this.style.display = 'none';
    document.getElementById('loader').style.display = 'block';

    // Convertir l'image en base64
    const file = imageInput.files[0];
    const base64 = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.readAsDataURL(file);
    });

    try {
      const response = await fetch(
        `https://detect.roboflow.com/${ROBOFLOW_PROJECT}/${ROBOFLOW_VERSION}?api_key=${ROBOFLOW_API_KEY}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: base64
        }
      );

      const result = await response.json();
      document.getElementById('loader').style.display = 'none';
      document.getElementById('AnalyzeBtn').style.display = 'flex';

      if (result.predictions && result.predictions.length > 0) {
        const detection = result.predictions[0];
        const score = Math.round(detection.confidence * 100);
        alert(`Analyse terminée !\nDétecté : ${detection.class}\nScore de confiance : ${score}/100`);
      } else {
        alert("Aucune détection trouvée sur cette image.");
      }

    } catch (error) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('AnalyzeBtn').style.display = 'flex';
      alert("Erreur lors de l'analyse. Vérifie ta clé API et ton projet.");
    }
  });
</script>
</body>
</html>
